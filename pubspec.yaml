name: app_oficina
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  # Gerência de Estado
  provider: ^6.1.2
  # Utilitários
  intl: ^0.20.2
  url_launcher: ^6.3.0
  local_auth: ^2.3.0


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

# Configuração do Ícone do App
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

# Configuração da Tela de Abertura (Splash Screen)
flutter_native_splash:
  color: "#17191C"
  image: "assets/images/splash.png"
  android: true
  ios: true
  
  # Regras específicas e chatas do Android 12+
  android_12:
    image: "assets/images/splash.png"
    color: "#17191C"
    # Opcional: Se quiser garantir que ele use a imagem pura como um ícone no meio da tela
    # icon_background_color: "#17191C"